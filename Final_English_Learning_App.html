            background: linear-gradient(45deg, #FFD700, #FFA500);
            padding: 10px 20px; border-radius: 25px;
            font-size: 1.2rem; font-weight: bold; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer; transition: all 0.3s ease;
        }
        .coin-display:hover { transform: scale(1.05); }
        .shop-modal {
            background: white; border-radius: 20px; width: 90%; max-width: 600px;
            max-height: 80vh; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: scale(0.9); transition: transform 0.3s ease;
        }
        .shop-overlay.active .shop-modal {
            transform: scale(1);
        }
        .shop-controls {
            display: flex; align-items: center; gap: 15px;
        }
        .coin-balance {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            padding: 5px 15px; border-radius: 20px;
            font-weight: bold; color: white;
        }
        .shop-items-grid {
            max-height: 60vh; overflow-y: auto; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }
        .shop-item-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px; padding: 15px; text-align: center;
            color: white; cursor: pointer; transition: all 0.3s ease;
            border: 3px solid transparent;
        }
        .shop-item-card:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .shop-item-card.purchased { background: linear-gradient(135deg, #4CAF50, #45a049); }
        .shop-item-card.unaffordable { opacity: 0.6; cursor: not-allowed; }
        .shop-item-card h4 { margin-bottom: 8px; font-size: 1.1rem; }
        .shop-item-card p { margin-bottom: 12px; opacity: 0.9; font-size: 0.9rem; }
        .shop-item-card .price {
            background: rgba(255,255,255,0.2); padding: 5px 10px;
            border-radius: 15px; font-weight: bold; display: inline-block;
        }
        .shop-item-card.purchased .price { background: rgba(255,255,255,0.3); }
        .shop-item-card.unaffordable .price { background: rgba(255,255,255,0.1); }
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .word-text { font-size: 2.5rem; }
            .word-chinese { font-size: 1.8rem; }
            .button-grid { grid-template-columns: 1fr 1fr; }
            .quiz-options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌟 英语学习小助手 🌟</h1>
            <p class="subtitle">让学习英语变得有趣又简单！</p>
            <div class="coin-shop-container">
                <button class="shop-button" onclick="openShop()" id="shop-button">
                    🏪 金币商店
                </button>
                <div class="coin-display" id="coin-display" onclick="openShop()">
                    💰 金币: 0
                </div>
            </div>
        </header>

        <!-- Full Screen Shop Overlay -->
        <div class="shop-overlay" id="shop-overlay">
            <div class="shop-modal">
                <div class="shop-header">
                    <h3>🏪 金币商店</h3>
                    <div class="shop-controls">
                        <span class="coin-balance">💰 <span id="shop-coin-balance">0</span></span>
                        <button class="close-shop" onclick="closeShop()">✖️</button>
                    </div>
                </div>
                <div class="shop-items-grid" id="shop-items-grid">
                    <!-- Shop items will be generated by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Selection Screen -->
        <div class="selection-screen" id="selection-screen">
            <div class="selection-group">
                <h2>请选择年级</h2>
                <div class="button-grid">
                    <button class="btn btn-grade1" onclick="selectGrade('grade1')">1年级</button>
                    <button class="btn btn-grade2" onclick="selectGrade('grade2')">2年级</button>
                </div>
            </div>

            <div class="selection-group">
                <h2>请选择学期</h2>
                <div class="button-grid">
                    <button class="btn btn-semester1" disabled onclick="selectSemester('上学期')">上学期</button>
                    <button class="btn btn-semester2" disabled onclick="selectSemester('下学期')">下学期</button>
                </div>
            </div>

            <div class="selection-group">
                <h2>请选择单元</h2>
                <div class="button-grid">
                    <button class="btn btn-unit1" disabled onclick="selectUnit('unit1')">Unit 1</button>
                    <button class="btn btn-unit2" disabled onclick="selectUnit('unit2')">Unit 2</button>
                    <button class="btn btn-unit3" disabled onclick="selectUnit('unit3')">Unit 3</button>
                    <button class="btn btn-unit4" disabled onclick="selectUnit('unit4')">Unit 4</button>
                    <button class="btn btn-unit5" disabled onclick="selectUnit('unit5')">Unit 5</button>
                    <button class="btn btn-unit6" disabled onclick="selectUnit('unit6')">Unit 6</button>
                </div>
            </div>

            <div class="selection-group">
                <h2>选择学习模式</h2>
                <div class="button-grid">
                    <button class="btn btn-learn" onclick="startLearning()">📚 学习模式</button>
                    <button class="btn btn-quiz" onclick="startQuiz()">🎯 测验模式</button>
                </div>
            </div>
        </div>

        <!-- Learning Mode -->
        <div class="learning-mode hidden" id="learning-mode">
            <div class="flashcard" id="flashcard">
                <p style="font-size: 1.5rem; color: #666;">请选择年级、学期和单元后开始学习</p>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="learning-progress">0%</div>
            </div>

            <div class="mode-navigation">
                <button class="nav-btn" id="prev-btn" onclick="prevWord();">⬅️ 上一个</button>
                <button class="nav-btn" id="toggle-chinese-btn" onclick="toggleChinese();">显示中文</button>
                <button class="nav-btn" id="pronounce-btn" onclick="console.log('Button clicked'); pronounceWord();">🔊 发音</button>
                <button class="nav-btn" id="next-btn" onclick="nextWord();">下一个 ➡️</button>
            </div>

            <div class="mode-navigation">
                <button class="nav-btn" onclick="backToSelection()">🏠 返回选择</button>
                <button class="nav-btn" onclick="openShop()">🏪 金币商店</button>
            </div>
        </div>

        <!-- Quiz Mode -->
        <div class="quiz-mode hidden" id="quiz-mode">
            <div class="quiz-question">
                <h2 id="quiz-question-text">测验问题</h2>
                <div class="word-emoji" id="quiz-emoji">📝</div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="quiz-progress">第 1 / 16 题</div>
            </div>

            <div class="quiz-options" id="quiz-options">
                <p style="grid-column: 1/-1; text-align: center; color: #666;">请选择答案</p>
            </div>

            <div class="mode-navigation">
                <button class="nav-btn" onclick="backToSelection()">🏠 返回选择</button>
                <button class="nav-btn" onclick="openShop()">🏪 金币商店</button>
            </div>

            <div class="score-display" id="score-display">
                得分: 0
            </div>
        </div>
    </div>

    <script>
        let currentGrade = null;
        let currentSemester = null;
        let currentUnit = null;
        let currentWords = [];
        let currentWordIndex = 0;
        let showingChinese = false;
        let showingPhonetic = false;
        let quizQuestions = [];
        let currentQuizIndex = 0;
        let quizScore = 0;
        let totalCoins = 0;
        let purchasedItems = JSON.parse(localStorage.getItem('purchasedItems')) || [];

        function selectGrade(grade) {
            currentGrade = grade;
            document.querySelectorAll('.btn-grade1, .btn-grade2').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
            enableSemesterButtons();
            console.log('Selected grade:', grade);
        }

        function selectSemester(semester) {
            currentSemester = semester;
            document.querySelectorAll('.btn-semester1, .btn-semester2').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
            enableUnitButtons();
            console.log('Selected semester:', semester);
        }

        function selectUnit(unit) {
            currentUnit = unit;
            document.querySelectorAll('.btn-unit1, .btn-unit2, .btn-unit3, .btn-unit4, .btn-unit5, .btn-unit6').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
            currentWords = getCurrentWords(currentGrade, currentSemester, currentUnit);
            console.log('Selected unit:', unit, 'Word count:', currentWords.length);
        }

        function enableSemesterButtons() {
            document.querySelectorAll('.btn-semester1, .btn-semester2').forEach(btn => {
                btn.disabled = false;
                btn.style.opacity = '1';
            });
        }

        function enableUnitButtons() {
            document.querySelectorAll('.btn-unit1, .btn-unit2, .btn-unit3, .btn-unit4, .btn-unit5, .btn-unit6').forEach(btn => {
                btn.disabled = false;
                btn.style.opacity = '1';
            });
        }

        function startLearning() {
            if (!currentGrade || !currentSemester || !currentUnit) {
                alert('请先选择年级、学期和单元！');
                return;
            }

            if (currentWords.length === 0) {
                alert('当前单元没有单词！');
                return;
            }

            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('learning-mode').classList.remove('hidden');
            document.getElementById('quiz-mode').classList.add('hidden');
            currentWordIndex = 0;
            showingChinese = false;
            showingPhonetic = false;
            displayWord();
        }

        function displayWord() {
            if (currentWordIndex >= currentWords.length) {
                currentWordIndex = 0;
            }

            const word = currentWords[currentWordIndex];
            const flashcard = document.getElementById('flashcard');

            flashcard.innerHTML = `
                <div class="word-emoji hidden" id="word-emoji">${word.emoji}</div>
                <div class="word-text">${word.english}</div>
                <div class="pronunciation hidden" id="pronunciation">/${word.pronunciation}/</div>
                <div class="word-chinese hidden" id="chinese-meaning">${word.chinese}</div>
            `;

            showingChinese = false;
            showingPhonetic = false;
            document.getElementById('toggle-chinese-btn').textContent = '显示中文';
            document.getElementById('pronounce-btn').textContent = '🔊 发音';
            document.getElementById('chinese-meaning').classList.add('hidden');

            // Re-attach event listeners to ensure they work
            document.getElementById('pronounce-btn').onclick = function() {
                console.log('Pronounce button clicked (re-attached)');
                pronounceWord();
            };
            document.getElementById('toggle-chinese-btn').onclick = function() {
                console.log('Toggle Chinese button clicked (re-attached)');
                toggleChinese();
            };

            updateLearningProgress();
        }

        function toggleChinese() {
            const chineseElement = document.getElementById('chinese-meaning');
            const emojiElement = document.getElementById('word-emoji');
            showingChinese = !showingChinese;

            if (showingChinese) {
                chineseElement.classList.remove('hidden');
                emojiElement.classList.remove('hidden'); // Show emoji (picture) when showing Chinese
                document.getElementById('toggle-chinese-btn').textContent = '隐藏中文';
                // Read the Chinese meaning when showing it
                const word = currentWords[currentWordIndex];
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(word.chinese);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 0.9;
                    window.speechSynthesis.speak(utterance);
                }
            } else {
                chineseElement.classList.add('hidden');
                emojiElement.classList.add('hidden'); // Hide emoji when hiding Chinese
                document.getElementById('toggle-chinese-btn').textContent = '显示中文';
            }
        }

        function pronounceWord() {
            const word = currentWords[currentWordIndex];
            const emojiElement = document.getElementById('word-emoji');

            if (!showingPhonetic) {
                document.getElementById('pronunciation').classList.remove('hidden');
                // Keep emoji hidden when pronouncing - only show on Chinese toggle
                document.getElementById('pronounce-btn').textContent = '🔊 再次发音';
                showingPhonetic = true;
            }

            // Check for speech synthesis support
            if (!window.speechSynthesis) {
                alert('您的浏览器不支持语音功能，请使用Chrome或Safari浏览器！');
                return;
            }

            // Cancel any ongoing speech first
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word.english);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            utterance.pitch = 1.1;
            utterance.volume = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function nextWord() {
            currentWordIndex++;
            showingChinese = false;
            showingPhonetic = false;
            displayWord();
        }

        function prevWord() {
            currentWordIndex = Math.max(0, currentWordIndex - 1);
            showingChinese = false;
            showingPhonetic = false;
            displayWord();
        }

        function updateLearningProgress() {
            const progress = ((currentWordIndex + 1) / currentWords.length) * 100;
            document.getElementById('learning-progress').style.width = progress + '%';
            document.getElementById('learning-progress').textContent = `${Math.round(progress)}%`;
        }

        function startQuiz() {
            if (!currentGrade || !currentSemester || !currentUnit) {
                alert('请先选择年级、学期和单元！');
                return;
            }

            if (currentWords.length === 0) {
                alert('当前单元没有单词！');
                return;
            }

            quizQuestions = generateComprehensiveQuiz(currentWords);
            currentQuizIndex = 0;
            quizScore = 0;

            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('learning-mode').classList.add('hidden');
            document.getElementById('quiz-mode').classList.remove('hidden');

            displayQuizQuestion();
        }

        function generateComprehensiveQuiz(words) {
            const questions = [];
            const selectedWords = [...words].sort(() => Math.random() - 0.5).slice(0, Math.min(8, words.length));

            selectedWords.forEach(word => {
                questions.push({
                    word: word,
                    isChineseToEnglish: true,
                    questionText: `"${word.chinese}"的英文单词是什么？`,
                    correctAnswer: word.english,
                    options: generateOptionsForWord(word, 'english')
                });

                questions.push({
                    word: word,
                    isChineseToEnglish: false,
                    questionText: `"${word.english}"的中文意思是什么？`,
                    correctAnswer: word.chinese,
                    options: generateOptionsForWord(word, 'chinese')
                });
            });

            return questions.sort(() => Math.random() - 0.5);
        }

        function generateOptionsForWord(targetWord, answerType) {
            const allWords = getCurrentWords(currentGrade, currentSemester, currentUnit);
            const options = [];

            const correctText = answerType === 'english' ? targetWord.english : targetWord.chinese;
            options.push({
                text: correctText,
                correct: true
            });

            const wrongOptions = [];
            const availableWords = allWords.filter(word => {
                return word.english !== targetWord.english && word.chinese !== targetWord.chinese;
            });

            const selectedWrongWords = [...availableWords].sort(() => Math.random() - 0.5).slice(0, 3);

            selectedWrongWords.forEach(word => {
                const wrongText = answerType === 'english' ? word.english : word.chinese;
                if (wrongText !== correctText) {
                    wrongOptions.push({
                        text: wrongText,
                        correct: false
                    });
                }
            });

            while (wrongOptions.length < 3) {
                const fallbackText = answerType === 'english' ? '???' : '？？？';
                wrongOptions.push({
                    text: fallbackText,
                    correct: false
                });
            }

            options.push(...wrongOptions);
            return options.sort(() => Math.random() - 0.5);
        }

        function displayQuizQuestion() {
            if (currentQuizIndex >= quizQuestions.length) {
                finishQuiz();
                return;
            }

            const question = quizQuestions[currentQuizIndex];
            const isChineseToEnglish = question.isChineseToEnglish;

            document.getElementById('quiz-question-text').textContent = question.questionText;
            document.getElementById('quiz-emoji').textContent = '❓';

            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';

            question.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'quiz-option';
                button.textContent = option.text;
                button.onclick = () => checkAnswer(option, button, question);
                optionsContainer.appendChild(button);
            });

            updateQuizProgress();
        }

        function checkAnswer(selectedOption, buttonElement, question) {
            document.querySelectorAll('.quiz-option').forEach(btn => {
                btn.disabled = true;
            });

            document.getElementById('quiz-emoji').textContent = question.word.emoji;
            playSound(selectedOption.correct);

            if (selectedOption.correct) {
                buttonElement.classList.add('correct');
                quizScore++;
                totalCoins++; // Award 1 coin for each correct answer
                updateScoreDisplay();
                updateCoinDisplay();

                setTimeout(() => {
                    document.querySelectorAll('.quiz-option').forEach(btn => {
                        btn.disabled = false;
                    });
                    currentQuizIndex++;
                    displayQuizQuestion();
                }, 1500);
            } else {
                buttonElement.classList.add('incorrect');

                document.querySelectorAll('.quiz-option').forEach(btn => {
                    if (btn.textContent === question.correctAnswer) {
                        btn.classList.add('correct');
                    }
                });

                const rememberBtn = document.createElement('button');
                rememberBtn.textContent = '💡 我记住了';
                rememberBtn.className = 'nav-btn';
                rememberBtn.style.marginTop = '20px';
                rememberBtn.onclick = function() {
                    this.remove();
                    document.querySelectorAll('.quiz-option').forEach(btn => {
                        btn.disabled = false;
                    });
                    currentQuizIndex++;
                    displayQuizQuestion();
                };

                const quizContainer = document.getElementById('quiz-mode');
                quizContainer.appendChild(rememberBtn);
            }
        }

        function updateQuizProgress() {
            const progress = ((currentQuizIndex + 1) / quizQuestions.length) * 100;
            document.getElementById('quiz-progress').style.width = progress + '%';
            document.getElementById('quiz-progress').textContent = `第 ${currentQuizIndex + 1} / ${quizQuestions.length} 题`;
        }

        function updateScoreDisplay() {
            document.getElementById('score-display').textContent = `得分: ${quizScore}`;
        }

        function finishQuiz() {
            const percentage = Math.round((quizScore / quizQuestions.length) * 100);
            let message = `测验完成！你答对了 ${quizScore} / ${quizQuestions.length} 题 (${percentage}%)`;

            if (percentage >= 90) {
                message += '\n太棒了！你是英语小达人！🎉';
                totalCoins += 5; // Bonus 5 coins for perfect score
                message += `\n获得完美奖励：5金币！`;
                updateCoinDisplay();
                alert(message);
            } else if (percentage >= 70) {
                message += '\n做得很好！继续加油！👏';
            } else if (percentage >= 50) {
                message += '\n不错！多练习会更好！💪';
            } else {
                message += '\n没关系，多练习就会进步！📚';
            }

            alert(message);
            backToSelection();
        }

        function playSound(isCorrect) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();

            if (isCorrect) {
                const frequencies = [523.25, 659.25, 783.99];
                frequencies.forEach((freq, index) => {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);

                    oscillator.frequency.value = freq;
                    oscillator.type = 'sine';

                    const startTime = audioContext.currentTime + index * 0.1;
                    const endTime = startTime + 0.2;

                    gainNode.gain.setValueAtTime(0.3, startTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, endTime);

                    oscillator.start(startTime);
                    oscillator.stop(endTime);
                });
            } else {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = 400;
                oscillator.type = 'sine';

                const startTime = audioContext.currentTime;
                const endTime = startTime + 0.5;

                gainNode.gain.setValueAtTime(0.3, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, endTime);

                oscillator.start(startTime);
                oscillator.stop(endTime);

                const oscillator2 = audioContext.createOscillator();
                const gainNode2 = audioContext.createGain();
                oscillator2.connect(gainNode2);
                gainNode2.connect(audioContext.destination);

                oscillator2.frequency.value = 300;
                oscillator2.type = 'sine';

                const startTime2 = audioContext.currentTime + 0.1;
                const endTime2 = startTime2 + 0.4;

                gainNode2.gain.setValueAtTime(0.3, startTime2);
                gainNode2.gain.exponentialRampToValueAtTime(0.01, endTime2);

                oscillator2.start(startTime2);
                oscillator2.stop(endTime2);
            }
        }

        function backToSelection() {
            document.getElementById('selection-screen').classList.remove('hidden');
            document.getElementById('learning-mode').classList.add('hidden');
            document.getElementById('quiz-mode').classList.add('hidden');
            currentWords = [];
        }

        // Shop functionality
        function toggleShop() {
            const overlay = document.getElementById('shop-overlay');
            if (overlay.classList.contains('active')) {
                closeFullShop();
            } else {
                openFullShop();
            }
        }

        function openShop() {
            openFullShop();
        }

        function openFullShop() {
            const overlay = document.getElementById('shop-overlay');
            overlay.classList.add('active');
            updateShopItems();
            document.getElementById('shop-coin-balance').textContent = totalCoins;
        }

        function closeShop() {
            closeFullShop();
        }

        function closeFullShop() {
            const overlay = document.getElementById('shop-overlay');
            overlay.classList.remove('active');
        }

        function updateCoinDisplay() {
            document.getElementById('coin-display').textContent = `💰 金币: ${totalCoins} 🏪`;
            localStorage.setItem('totalCoins', totalCoins);
        }

        function updateShopItems() {
            const shopGrid = document.getElementById('shop-items-grid');
            shopGrid.innerHTML = '';

            const shopItems = [
                { name: '学习徽章', price: 50, icon: '🏅', desc: '基础学习成就' },
                { name: '小星星贴纸', price: 75, icon: '⭐', desc: '收集可爱贴纸' },
                { name: '彩色铅笔', price: 100, icon: '🖍️', desc: '绘画学习工具' },
                { name: '迷你词典', price: 150, icon: '📖', desc: '随身查单词' },
                { name: '英语故事书', price: 175, icon: '📚', desc: '阅读提升' },
                { name: '单词卡片套装', price: 200, icon: '📮', desc: '复习必备' },
                { name: '电子单词笔', price: 250, icon: '✏️', desc: '智能学习' },
                { name: '学习海报', price: 275, icon: '🖼️', desc: '装饰空间' },
                { name: '英语游戏卡', price: 300, icon: '🃏', desc: '趣味学习' },
                { name: '智能学习手表', price: 350, icon: '⌚', desc: '高级装备' }
            ];

            shopItems.forEach(item => {
                const itemCard = document.createElement('div');
                itemCard.className = 'shop-item-card';
                if (purchasedItems.includes(item.name)) {
                    itemCard.classList.add('purchased');
                } else if (totalCoins < item.price) {
                    itemCard.classList.add('unaffordable');
                }

                if (!itemCard.classList.contains('purchased')) {
                    itemCard.onclick = () => purchaseItem(item);
                }

                itemCard.innerHTML = `
                    <h4>${item.icon} ${item.name}</h4>
                    <p>${item.desc}</p>
                    <div class="price">${item.price}金币</div>
                    ${itemCard.classList.contains('purchased') ? '<div class="purchased-text">已购买</div>' : ''}
                `;

                shopGrid.appendChild(itemCard);
            });
        }

        function purchaseItem(item) {
            if (totalCoins >= item.price && !purchasedItems.includes(item.name)) {
                totalCoins -= item.price;
                purchasedItems.push(item.name);
                localStorage.setItem('totalCoins', totalCoins);
                localStorage.setItem('purchasedItems', JSON.stringify(purchasedItems));
                updateCoinDisplay();
                updateShopItems();
                alert(`成功购买 ${item.name}！`);
            } else if (purchasedItems.includes(item.name)) {
                alert('您已经购买过这个物品了！');
            } else {
                alert('金币不足！');
            }
        }

        // Load saved data on page load
        window.addEventListener('load', function() {
            const savedCoins = localStorage.getItem('totalCoins');
            if (savedCoins) {
                totalCoins = parseInt(savedCoins);
                updateCoinDisplay();
            }
            const savedItems = localStorage.getItem('purchasedItems');
            if (savedItems) {
                purchasedItems = JSON.parse(savedItems);
            }
        });

        // Close shop when clicking outside
        document.getElementById('shop-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeFullShop();
            }
        });

        function openShop() {
            openFullShop();
        }

        function openFullShop() {
            const overlay = document.getElementById('shop-overlay');
            overlay.classList.add('active');
            updateShopItems();
            document.getElementById('shop-coin-balance').textContent = totalCoins;
        }

        function closeShop() {
            closeFullShop();
        }

        function closeFullShop() {
            const overlay = document.getElementById('shop-overlay');
            overlay.classList.remove('active');
        }

        function updateCoinDisplay() {
            document.getElementById('coin-display').textContent = `💰 金币: ${totalCoins} 🏪`;
            localStorage.setItem('totalCoins', totalCoins);
        }

        function updateShopItems() {
            const shopGrid = document.getElementById('shop-items-grid');
            shopGrid.innerHTML = '';

            const shopItems = [
                { name: '学习徽章', price: 50, icon: '🏅', desc: '基础学习成就' },
                { name: '小星星贴纸', price: 75, icon: '⭐', desc: '收集可爱贴纸' },
                { name: '彩色铅笔', price: 100, icon: '🖍️', desc: '绘画学习工具' },
                { name: '迷你词典', price: 150, icon: '📖', desc: '随身查单词' },
                { name: '英语故事书', price: 175, icon: '📚', desc: '阅读提升' },
                { name: '单词卡片套装', price: 200, icon: '📮', desc: '复习必备' },
                { name: '电子单词笔', price: 250, icon: '✏️', desc: '智能学习' },
                { name: '学习海报', price: 275, icon: '🖼️', desc: '装饰空间' },
                { name: '英语游戏卡', price: 300, icon: '🃏', desc: '趣味学习' },
                { name: '智能学习手表', price: 350, icon: '⌚', desc: '高级装备' }
            ];

            shopItems.forEach(item => {
                const itemCard = document.createElement('div');
                itemCard.className = 'shop-item-card';
                if (purchasedItems.includes(item.name)) {
                    itemCard.classList.add('purchased');
                } else if (totalCoins < item.price) {
                    itemCard.classList.add('unaffordable');
                }

                if (!itemCard.classList.contains('purchased')) {
                    itemCard.onclick = () => purchaseItem(item);
                }

                itemCard.innerHTML = `
                    <h4>${item.icon} ${item.name}</h4>
                    <p>${item.desc}</p>
                    <div class="price">${item.price}金币</div>
                    ${itemCard.classList.contains('purchased') ? '<div class="purchased-text">已购买</div>' : ''}
                `;

                shopGrid.appendChild(itemCard);
            });
        }

        function purchaseItem(item) {
            if (totalCoins >= item.price && !purchasedItems.includes(item.name)) {
                totalCoins -= item.price;
                purchasedItems.push(item.name);
                localStorage.setItem('totalCoins', totalCoins);
                localStorage.setItem('purchasedItems', JSON.stringify(purchasedItems));
                updateCoinDisplay();
                updateShopItems();
                alert(`成功购买 ${item.name}！`);
            } else if (purchasedItems.includes(item.name)) {
                alert('您已经购买过这个物品了！');
            } else {
                alert('金币不足！');
            }
        }

        // Load saved data on page load
        window.addEventListener('load', function() {
            const savedCoins = localStorage.getItem('totalCoins');
            if (savedCoins) {
                totalCoins = parseInt(savedCoins);
                updateCoinDisplay();
            }
            const savedItems = localStorage.getItem('purchasedItems');
            if (savedItems) {
                purchasedItems = JSON.parse(savedItems);
            }
        });
    </script>
</body>
</html>
